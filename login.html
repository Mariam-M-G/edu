<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EduPulse</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Salsa&display=swap" rel="stylesheet">

</head>
<body>
    <div class="login-container">
        
        <div class="login-card">
            <!-- Logo Section -->
            <div class="login-header">
                <div class="logo-wrapper">
                    <img class="logo-icon" src="images\educational-idea.png" alt="EduPulse Logo" width="90" height="80">
                    <span class="logo-text">EduPulse</span>
                </div>
                <p class="tagline">Welcome back to your smart academic alert system! <span class="emoji">🎓</span></p>
            </div>

            <!-- Login Form -->
            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <div class="input-icon">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <input type="email" id="email" placeholder="Email address" required>
                </div>

                <div class="input-group">
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                    </div>
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="button" class="toggle-password" onclick="togglePassword()">
                        <i class="fas fa-eye" id="toggleIcon"></i>
                    </button>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember">
                        <span class="checkmark"></span>
                        Remember me
                    </label>
                    <a href="#" class="forgot-link" onclick="showForgotPassword()">Forgot password?</a>
                </div>

                <button type="submit" class="login-btn" onclick="handleLogin(event)">
                    <span>Sign In</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <!-- Divider -->
            <div class="divider">
                <span>Or continue with</span>
            </div>

            <!-- Social Login -->
            <div class="social-login">
                <button class="social-btn google" onclick="socialLogin('google')">
                    <img src="images\google-symbol.png" alt="Google" width="24" height="24">
                    Google
                </button>
                <button class="social-btn microsoft" onclick="socialLogin('microsoft')">
                    <img src="images\microsoft.png" alt="Microsoft" width="24" height="24">
                    Microsoft
                </button>
            </div>

            <!-- Sign Up Link -->
            <div class="signup-redirect">
                <p>Don't have an account? <a href="signup.html">Create an account</a></p>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast-notification"></div>

    <script src="login.js"></script>
</body>
</html>
